project:
  name: "Project Name"
  industry: "local-service"
  projectSlug: "project-name"
  audience:
    - "primary audience"

artifacts:
  outputDir: "./artifacts"
  projectSlug: "project-name"
  pageSlugStrategy: "url-path"
  rootDirs:
    project: "{outputDir}/{project_brand}"
    designSystem: "{outputDir}/{project_brand}/design-system"
    page: "{outputDir}/{project_brand}/{page}"
    sections: "{outputDir}/{project_brand}/{page}/sections"
    components: "{outputDir}/{project_brand}/{page}/components"
    elements: "{outputDir}/{project_brand}/{page}/elements"
    screenshots: "{outputDir}/{project_brand}/{page}/.screenshots"
    motionScreenshots: "{outputDir}/{project_brand}/{page}/.motion_screenshots"
    failedCaptures: "{outputDir}/{project_brand}/{page}/.screenshots/failed"
    captureManifest: "{outputDir}/{project_brand}/{page}/capture-manifest.json"
    visualExperienceSpec: "{outputDir}/{project_brand}/{page}/visual-experience-spec.md"

designSystem:
  outputDir: "{artifacts.rootDirs.designSystem}"
  mode: "seed"
  maturity: "designSystemSeed"
  defaultTone: "clear, trustworthy, direct"
  tokenFormat: "json"
  requiredSections:
    - "brand"
    - "palette"
    - "typography"
    - "iconography"
    - "buttons"
    - "cards"
    - "header"
    - "footer"
  confidenceThreshold: "medium"
  requireSourceConfidence: true

knowledge:
  outputDir: "{artifacts.rootDirs.project}/knowledge"
  confidenceThreshold: "medium"

blueprint:
  outputDir: "{artifacts.rootDirs.page}/wireframe"
  schemaVersion: "0.1.0"

prototype:
  outputDir: "{artifacts.rootDirs.page}/prototype"
  schemaVersion: "0.1.0"

reactComponents:
  outputDir: "{artifacts.rootDirs.page}/components"
  defaultComponentCodeFormat: "tsx"
  componentBuildConventionPath: "./docs/react-component-conventions.md"
  conventionPrecedence:
    - "repository-defaults"
    - "bundle-defaults"
    - "consumer-componentBuildConventionPath"
    - "current-user-request"

capture:
  screenshots: true
  manifest: "capture-manifest.json"
  rejectBlankFrames: true
  retryCount: 3
  failedCaptureDir: ".screenshots/failed"
  wait:
    strategy: "content-ready"
    maxWaitMs: 15000
    idleWaitMs: 1500
    readySelectors:
      - "main"
      - "[data-ui-ready='true']"
    loaderSelectors:
      - ".loader"
      - "[data-loading='true']"
      - "[aria-busy='true']"
  viewports:
    desktop:
      width: 1440
      height: 1200
    tablet:
      width: 834
      height: 1112
    mobile:
      width: 390
      height: 1200
  motionFrames:
    enabled: true
    directory: ".motion_screenshots"
    filePattern: "{page}_frame_{index}.jpeg"
    scrollProgress:
      - 0
      - 0.1
      - 0.25
      - 0.5
      - 0.75
      - 1

visualExperience:
  outputFile: "visual-experience-spec.md"
  requiredSections:
    - "Evidence Files"
    - "Palette Timeline"
    - "Scroll Storyboard"
    - "Section State Map"
    - "Motion Fields"
    - "Captured Frame Index"
    - "Rendering Layer Ownership"
    - "Design Quality Notes"
    - "Implementation Notes"
    - "Originality Guardrails"
